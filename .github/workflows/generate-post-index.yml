name: generate-post-index

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/posts/**/*.md'
      - 'src/content/posts/*.md'
      - 'scripts/generate-post-index.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # 关键修改：去掉 --frozen-lockfile，改用 --no-frozen-lockfile
        # 这样即使你手动改了 package.json，它也会自动同步更新环境，不再报错
        run: pnpm install --no-frozen-lockfile

      - name: Generate posts index
        run: pnpm generate:index

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 注意：你的脚本输出路径是 public/posts-index.json，确保这里检查的是正确的文件
          if git diff --quiet -- public/posts-index.json; then
            echo "No changes"
          else
            git add public/posts-index.json
            git commit -m "chore: update posts index"
            git push
          fi
