name: Auto Generate Posts Index & Deploy Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 加上这一行，以后 Actions 页面就会出现手动运行按钮    
    paths:
      - 'src/content/posts/**/*.md'
      - 'scripts/generate-post-index.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # 🟢 核心：允许同步 package.json 的改动到 lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Generate posts-index.json
        run: node scripts/generate-post-index.mjs

      - name: Commit index if changed
        # 使用 continue-on-error 确保即使 git push 失败（比如极罕见的竞态条件）也不会中断部署
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/posts-index.json; then
            echo "No changes"
          else
            git add public/posts-index.json
            git commit -m "chore: update posts index [skip ci]"
            git push
          fi

      - name: Build Astro blog
        # 🟢 策略：直接使用 astro build 跳过 package.json 里的 biome 等检查
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./dist --project-name "leehenry-blog-astro" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}