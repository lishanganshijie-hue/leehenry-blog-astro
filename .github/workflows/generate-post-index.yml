name: Auto Generate Posts Index & Deploy Blog

on:
  push:
    branches:
      - main
    paths: # 修正了缩进，确保只有改动这些文件才触发自动部署
      - 'src/content/posts/**/*.md'
      - 'src/data/gallery.json'               # 🌟 新增：只要这个相册 JSON 变了，也立刻自动触发部署！
      - 'scripts/generate-post-index.mjs'
      - 'scripts/generate-post-index.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch: # 手动运行按钮现在是独立的了

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 🟢 增加这一行，确保 Action 有权限推送到你的仓库
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate posts-index.json
        run: node scripts/generate-post-index.mjs

      - name: Commit index if changed
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 🟢 强制检查文件是否存在
          ls -l public/posts-index.json || echo "File not found"
          git add -f public/posts-index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update posts index [skip ci]"
            git push origin main
          fi

      - name: Build Astro blog
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./dist --project-name "leehenry-blog-astro" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}